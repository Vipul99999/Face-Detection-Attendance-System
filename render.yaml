services:
  - type: web
    name: face-attendance-backend
    runtime: docker
    plan: starter
    rootDir: backend
    disk:
      name: face-attendance-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: Face Attendance MVP
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: EMBEDDING_ENCRYPTION_KEY
        generateValue: true
      - key: PREVIOUS_EMBEDDING_ENCRYPTION_KEYS
        value: ""
      - key: AUTH_TOKEN_EXPIRY_HOURS
        value: "12"
      - key: ENABLE_LIVENESS_CHECKS
        value: "false"
      - key: LIVENESS_SECRET
        generateValue: true
      - key: LIVENESS_TOKEN_EXPIRY_SECONDS
        value: "45"
      - key: DATABASE_PATH
        value: /app/data/face_attendance.db
      - key: UPLOAD_DIR
        value: /app/data/images
      - key: ANTI_SPOOF_MODEL_PATH
        value: /app/models/anti_spoof_modelrgb.onnx
      - key: ANTI_SPOOF_THRESHOLD
        value: "0.2808"
      - key: STORE_FACE_IMAGES
        value: "false"
      - key: PURGE_LEGACY_FACE_IMAGES
        value: "true"
      - key: ATTENDANCE_COOLDOWN_MINUTES
        value: "5"
      - key: FACE_MATCH_THRESHOLD
        value: "0.45"
      - key: DUPLICATE_MATCH_THRESHOLD
        value: "0.55"
  - type: web
    name: face-attendance-frontend
    runtime: docker
    plan: free
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
